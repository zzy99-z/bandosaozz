<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BẠN ĐỒ SAO Zz</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C3A461; --dark: #0b0e14; --glass: rgba(255, 255, 255, 0.08); }
        body { background: var(--dark); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; background-image: radial-gradient(circle at center, #1a1a2e 0%, #0b0e14 100%); background-attachment: fixed; }
        .container { max-width: 800px; margin: 0 auto; padding: 30px 15px; }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); text-align: center; letter-spacing: 3px; font-size: 2rem; margin-bottom: 5px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        label { display: block; margin-top: 15px; color: var(--gold); font-size: 0.85rem; font-weight: 500; }
        input { width: 100%; padding: 12px; margin-top: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--gold); color: white; border-radius: 10px; box-sizing: border-box; outline: none; }
        .btn-main { background: var(--gold); color: #000; border: none; padding: 16px; width: 100%; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; margin-top: 20px; font-size: 1rem; text-transform: uppercase; }
        .btn-main:hover { box-shadow: 0 0 20px var(--gold); transform: translateY(-2px); }
        #resultArea { display: none; margin-top: 30px; }
        .ai-content { line-height: 1.8; font-size: 0.95rem; color: #e0e0e0; }
        .ai-content h3 { color: var(--gold); border-bottom: 1px solid rgba(195,164,97,0.3); padding-bottom: 8px; margin-top: 25px; font-family: 'Playfair Display', serif; }
        .loading { text-align: center; color: var(--gold); font-style: italic; padding: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .tarot-section { border-top: 1px solid rgba(195,164,97,0.2); padding-top: 30px; text-align: center; margin-top: 40px; }
        .point-tag { font-size: 1.1rem; color: var(--gold); margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>BẠN ĐỒ SAO Zz</h1>
    <p style="text-align:center; opacity:0.6; font-size: 0.8rem; margin-bottom: 30px;">Giải mã số mệnh qua trí tuệ nhân tạo</p>

    <div class="glass-card">
        <label>Họ và Tên</label>
        <input type="text" id="userName" placeholder="Nhập tên của bạn...">
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1.5;"><label>Ngày tháng năm sinh</label><input type="date" id="dob"></div>
            <div style="flex: 1;"><label>Giờ sinh</label><input type="time" id="tob"></div>
        </div>
        <button class="btn-main" onclick="startAI()">Tạo Bản Đồ Sao Ngay</button>
    </div>

    <div id="resultArea" class="glass-card">
        <h2 style="text-align:center; color: var(--gold); font-family: 'Playfair Display', serif;">Lời Giải Mã Từ Vũ Trụ</h2>
        <div id="aiResponse" class="ai-content"></div>
    </div>

    <div class="tarot-section">
        <p class="point-tag">Năng lượng tích lũy: <span id="currentPoints">0</span>/50 pts</p>
        <button class="btn-main" style="width:auto; padding: 10px 25px; font-size: 0.8rem;" onclick="checkIn()">Điểm danh nhận 5 điểm</button>
    </div>
</div>

<script>

        const p1 = "AIzaSyCgaMA83d4"; 
        const p2 = "riZtKQfv4C5NF5UD57cD1NlA";
        const API_KEY = p1 + p2;


    let userPoints = parseInt(localStorage.getItem('zz_points')) || 0;
    document.getElementById('currentPoints').innerText = userPoints;

    function checkIn() {
        const today = new Date().toDateString();
        if (localStorage.getItem('zz_last_check') === today) {
            alert("Hôm nay bạn đã nhận năng lượng rồi!");
            return;
        }
        userPoints += 5;
        localStorage.setItem('zz_points', userPoints);
        localStorage.setItem('zz_last_check', today);
        document.getElementById('currentPoints').innerText = userPoints;
        alert("Chúc mừng! Bạn nhận được 5 điểm.");
    }

    async function startAI() {
        const name = document.getElementById('userName').value;
        const dob = document.getElementById('dob').value;
        const tob = document.getElementById('tob').value || "Không rõ giờ sinh";

        if (!name || !dob) {
            alert("Vui lòng điền tên và ngày sinh!");
            return;
        }

        const resultArea = document.getElementById('resultArea');
        const responseDiv = document.getElementById('aiResponse');
        
        resultArea.style.display = 'block';
        responseDiv.innerHTML = "<div class='loading'>Đang kết nối với các vì sao để giải mã...</div>";
        window.scrollTo({ top: resultArea.offsetTop - 20, behavior: 'smooth' });

        const prompt = `Bạn là nhà chiêm tinh học chuyên nghiệp của BẠN ĐỒ SAO Zz. 
        Hãy giải mã bản đồ sao cho: ${name}, sinh ngày: ${dob}, giờ sinh: ${tob}.
        Phân tích chi tiết các mục sau: Tuổi thơ, Gia đình, Sức khỏe, Sự nghiệp, Tiền bạc, Nhà cửa, Cha mẹ, Bạn bè, Anh em, Tình duyên, Hôn nhân, Con cái.
        Yêu cầu: Trả về kết quả bằng tiếng Việt, định dạng HTML đẹp mắt (dùng <h3> cho tiêu đề mục, <p> cho nội dung). Văn phong huyền bí, lôi cuốn.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                let cleanContent = data.candidates[0].content.parts[0].text;
                cleanContent = cleanContent.replace(/```html/g, "").replace(/```/g, "");
                responseDiv.innerHTML = cleanContent;
            } else {
                responseDiv.innerHTML = "Vũ trụ chưa phản hồi, hãy thử nhấn lại một lần nữa nhé!";
            }
        } catch (error) {
            responseDiv.innerHTML = "Lỗi kết nối vũ trụ! Vui lòng kiểm tra lại mạng hoặc API Key.";
        }
    }
</script>

</body>
</html>
