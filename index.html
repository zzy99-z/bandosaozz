<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BẠN ĐỒ SAO Zz - Giải Mã Vũ Trụ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C3A461; --dark: #0b0e14; --glass: rgba(255, 255, 255, 0.07); }
        body { background: var(--dark); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; background-image: radial-gradient(circle at center, #1a1a2e 0%, #0b0e14 100%); background-attachment: fixed; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        h1, h2 { font-family: 'Playfair Display', serif; color: var(--gold); text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        label { display: block; margin-top: 15px; color: var(--gold); font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; margin-top: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--gold); color: white; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; margin-top: 25px; font-size: 1rem; }
        .btn-main:hover { box-shadow: 0 0 20px var(--gold); transform: translateY(-2px); }
        #resultArea { display: none; margin-top: 40px; line-height: 1.8; }
        .ai-content { padding: 20px; border-left: 3px solid var(--gold); background: rgba(195, 164, 97, 0.05); border-radius: 0 15px 15px 0; }
        .ai-content h3 { color: var(--gold); border-bottom: 1px solid rgba(195,164,97,0.3); padding-bottom: 10px; }
        .tarot-section { border-top: 1px solid rgba(195,164,97,0.3); padding-top: 40px; text-align: center; }
        .point-tag { font-size: 1.3rem; color: var(--gold); font-weight: bold; }
        .tarot-grid { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .card-slot { width: 100px; height: 160px; background: linear-gradient(45deg, #1a1a2e, #C3A461); border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 2px solid var(--gold); transition: 0.5s; }
        .loading { text-align: center; color: var(--gold); font-style: italic; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
<div class="container">
    <h1>BẠN ĐỒ SAO Zz</h1>
    <p style="text-align:center; opacity:0.7;">Dịch vụ giải mã bản đồ sao cá nhân bằng trí tuệ nhân tạo</p>
    <div class="glass-card">
        <label>Họ và Tên</label>
        <input type="text" id="userName" placeholder="Ví dụ: Nguyễn Văn A">
        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;"><label>Ngày tháng năm sinh</label><input type="date" id="dob"></div>
            <div style="flex: 1;"><label>Giờ sinh (Nếu có)</label><input type="time" id="tob"></div>
        </div>
        <button class="btn-main" onclick="startAI()">KHÁM PHÁ BẢN ĐỒ SAO</button>
    </div>
    <div id="resultArea" class="glass-card">
        <h2>Kết Quả Giải Mã</h2>
        <div id="aiResponse" class="ai-content"></div>
    </div>
    <div class="tarot-section">
        <h2>Vòng Quay May Mắn</h2>
        <p class="point-tag">Năng lượng: <span id="currentPoints">0</span>/50 pts</p>
        <button class="btn-main" style="width:auto; padding: 10px 30px;" onclick="checkIn()">Điểm danh nhận 5 điểm</button>
        <div id="tarotGame" style="display:none;">
            <select id="tarotTopic" style="width:250px; margin-top:20px;"><option>Hôm nay thế nào?</option><option>Tình duyên sắp tới</option></select>
            <div class="tarot-grid"><div class="card-slot">?</div><div class="card-slot">?</div><div class="card-slot">?</div></div>
        </div>
    </div>
</div>
<script>
    const API_KEY = "AIzaSyCDoA28aJ2feSCsNnQeuzDcjXZwmKmL54Q";
    let userPoints = parseInt(localStorage.getItem('zz_points')) || 0;
    document.getElementById('currentPoints').innerText = userPoints;
    if (userPoints >= 50) document.getElementById('tarotGame').style.display = 'block';

    function checkIn() {
        const today = new Date().toDateString();
        if (localStorage.getItem('zz_last_check') === today) { alert("Hôm nay đã điểm danh rồi!"); return; }
        userPoints += 5; localStorage.setItem('zz_points', userPoints);
        localStorage.setItem('zz_last_check', today);
        document.getElementById('currentPoints').innerText = userPoints;
        if (userPoints >= 50) document.getElementById('tarotGame').style.display = 'block';
        alert("Bạn nhận được 5 điểm!");
    }

    async function startAI() {
        const name = document.getElementById('userName').value;
        const dob = document.getElementById('dob').value;
        const tob = document.getElementById('tob').value || "Không rõ";
        if (!name || !dob) { alert("Vui lòng điền đủ thông tin!"); return; }
        document.getElementById('resultArea').style.display = 'block';
        const responseDiv = document.getElementById('aiResponse');
        responseDiv.innerHTML = "<div class='loading'>Đang kết nối với các vì sao...</div>";
        const prompt = `Bạn là chuyên gia chiêm tinh của BẠN ĐỒ SAO Zz. Giải mã bản đồ sao cho ${name}, sinh ${dob}, giờ ${tob}. Phân tích: Tính cách, Tuổi thơ, Gia đình, Sức khỏe, Sự nghiệp, Tiền bạc, Tình duyên... Định dạng HTML đẹp.`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            responseDiv.innerHTML = data.candidates[0].content.parts[0].text;
        } catch (e) { responseDiv.innerHTML = "Lỗi kết nối vũ trụ!"; }
    }
</script>
</body>
</html>
